# Minimal Ingress for Minikube (palier 12/20). Replaced by Istio Gateway later (palier 18/20).
# /api/auth/* -> user-service /auth/*
# /api/users/* -> user-service /users/*
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edumatch-ingress
  namespace: edumatch
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: edumatch.local
      http:
        paths:
          - path: /api/(auth(?:/.*)?)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 80
          - path: /api/(users(?:/.*)?)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 80
