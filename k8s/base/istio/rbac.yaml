# Kubernetes-level RBAC: each ServiceAccount can only read its own
# ConfigMap and Secret. No service can read another service's credentials.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-config-reader
  namespace: edumatch
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["user-service-config"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["user-service-secret"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-config-reader
  namespace: edumatch
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: edumatch
roleRef:
  kind: Role
  name: user-service-config-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tutor-service-config-reader
  namespace: edumatch
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["tutor-service-config"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tutor-service-secret"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tutor-service-config-reader
  namespace: edumatch
subjects:
  - kind: ServiceAccount
    name: tutor-service
    namespace: edumatch
roleRef:
  kind: Role
  name: tutor-service-config-reader
  apiGroup: rbac.authorization.k8s.io
