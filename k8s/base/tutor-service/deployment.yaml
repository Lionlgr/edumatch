apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutor-service
  namespace: edumatch
  labels:
    app: tutor-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tutor-service
  template:
    metadata:
      labels:
        app: tutor-service
        version: v1
    spec:
      serviceAccountName: tutor-service
      containers:
        - name: tutor-service
          image: docker.io/lionlgr/edumatch-tutor-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: tutor-service-config
            - secretRef:
                name: tutor-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
