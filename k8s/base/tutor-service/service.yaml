apiVersion: v1
kind: Service
metadata:
  name: tutor-service
  namespace: edumatch
  labels:
    app: tutor-service
spec:
  type: ClusterIP
  selector:
    app: tutor-service
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
      appProtocol: grpc
